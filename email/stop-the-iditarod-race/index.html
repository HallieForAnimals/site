A%0A528%20dogs%20started%20in%202025%2C%20314%20dropped%20for%20injury%2C%20exhaustion%2C%20or%20illness%2C%20only%20214%20finished.%20Over%20150%20dogs%20have%20died%20in%20Iditarod%20history%20from%20pneumonia%2C%20heart%20failure%2C%20ulcers%2C%20collapse%2C%20all%20pushed%20too%20far.%0A%0AYou%20hold%20the%20power%2C%20budgets%2C%20and%20laws.%20Millions%20in%20sponsorships%20and%20support%20flow%20while%20dogs%20pay%20with%20their%20lives.%20When%20deaths%20happen%20and%20nothing%20changes%2C%20it%20exposes%20the%20hypocrisy%3A%20boasting%20freedom%20while%20denying%20it%20to%20sentient%20animals%20for%20%22tradition%22%20and%20profit.%0A%0AWe%20demand%3A%0A%0A1.%20Cancel%20all%20future%20Iditarod%20races%20immediately%20(ceremonial%20start%20is%20days%20away%20on%20March%207%2C%202026%2C%20stop%20it%20before%20more%20suffer)%20and%20publicly%20support%20ending%20the%20event.%0A2.%20Repeal%20the%20mushing%20exemption%20in%20AS%2011.61.140(e)%20through%20emergency%20legislation%20so%20cruelty%20laws%20apply%20fully%2C%20no%20more%20shields%20for%20deadly%20contests.%0A3.%20Launch%20an%20independent%20criminal%20investigation%20into%20Ventana's%202025%20death%20and%20other%20fatalities%2Fdrops%2C%20referring%20for%20charges%20where%20neglect%20or%20overexertion%20shows.%0A4.%20Require%20transparent%20public%20reports%20on%20every%20death%2C%20drop%20reason%2C%20necropsy%2C%20and%20actions%20taken.%0A5.%20Condemn%20this%20exploitation%20on%20your%20platforms%20and%20commit%20to%20real%20change%2C%20no%20more%20silence%20or%20defense.%0A%0ADogs%20deserve%20freedom%20from%20pain%2C%20fear%2C%20and%20exploitation%2C%20the%20same%20ideals%20we%20claim%20as%20a%20nation.%20Ventana's%20preventable%20death%20proves%20the%20system%20fails%20them.%0A%0AAct%20now.%20Deliver%20results%20before%20the%202026%20race%20starts.%20We%20expect%20concrete%20steps%20and%20public%20responses.%0A%0ASincerely%2C%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org">

<script>

  const SLUG='stop-the-iditarod-race', CTA_ID='stop-the-iditarod-race', MAILTO="mailto:rob.urbach@iditarod.com,corey.hester@iditarod.com,dpatterson@iditarod.com,mark.nordman@iditarod.com,sszelag@iditarod.com,dan.carter@iditarod.com,erika.friedrich@iditarod.com,jim.deprez@iditarod.com,Sen.Jesse.Kiehl@akleg.gov,Representative.Matt.Claman@akleg.gov,Governor@alaska.gov?subject=How%20Can%20We%20Call%20Ourselves%20%22Land%20of%20the%20Free%22%20While%20Iditarod%20Kills%20Dogs%20for%20Profit%3F&body=To%20whom%20it%20may%20concern%2C%0A%0AHow%20can%20America%20call%20herself%20the%20%22land%20of%20the%20free%22%20when%20the%20Iditarod%20Trail%20Sled%20Dog%20Race%20profits%20from%20chaining%20dogs%20to%20endless%20suffering%2C%20and%20forcing%20them%20to%20run%20until%20they%20collapse%20and%20die%2C%20all%20shielded%20by%20law%20from%20real%20cruelty%20charges%3F%0A%0AFreedom%3F%20No.%20It's%20exploitation.%20Dogs%20don't%20consent%20to%201000%2B%20mile%20grueling%20runs%20in%20brutal%20cold%20for%20human%20prizes%20and%20sponsorship%20money.%20Yet%20Alaska%20Statute%2011.61.140(e)%20gives%20a%20free%20pass%3A%20%22This%20section%20does%20not%20apply%20to%20generally%20accepted%20dog%20mushing%20or%20pulling%20contests%20or%20practices.%22%20That%20loophole%20means%20preventable%20deaths%20aren't%20treated%20as%20cruelty%20here.%0A%0ATake%20Ventana%3A%20In%20the%202025%20Iditarod%2C%20this%204-year-old%20dog%20collapsed%20and%20died%20on%20the%20trail%20about%208%20miles%20outside%20Galena%20after%20running%20over%20300%20miles%20for%20rookie%20musher%20Daniel%20Klein.%20Necropsy%20confirmed%20she%20was%20pregnant%20in%20a%20later%20stage%2C%20her%20condition%20missed%20in%20pre-race%20vet%20checks%20and%20oversight.%20She%20and%20her%20unborn%20puppies%20died.%20No%20criminal%20charges%20followed%2C%20despite%20calls%20for%20investigation.%20The%20musher%20was%20later%20disqualified%20by%20the%20Iditarod%20committee%20for%20inadequate%20care%2C%20but%20that's%20internal%20not%20justice%20under%20state%20law.%0A%0A528%20dogs%20started%20in%202025%2C%20314%20dropped%20for%20injury%2C%20exhaustion%2C%20or%20illness%2C%20only%20214%20finished.%20Over%20150%20dogs%20have%20died%20in%20Iditarod%20history%20from%20pneumonia%2C%20heart%20failure%2C%20ulcers%2C%20collapse%2C%20all%20pushed%20too%20far.%0A%0AYou%20hold%20the%20power%2C%20budgets%2C%20and%20laws.%20Millions%20in%20sponsorships%20and%20support%20flow%20while%20dogs%20pay%20with%20their%20lives.%20When%20deaths%20happen%20and%20nothing%20changes%2C%20it%20exposes%20the%20hypocrisy%3A%20boasting%20freedom%20while%20denying%20it%20to%20sentient%20animals%20for%20%22tradition%22%20and%20profit.%0A%0AWe%20demand%3A%0A%0A1.%20Cancel%20all%20future%20Iditarod%20races%20immediately%20(ceremonial%20start%20is%20days%20away%20on%20March%207%2C%202026%2C%20stop%20it%20before%20more%20suffer)%20and%20publicly%20support%20ending%20the%20event.%0A2.%20Repeal%20the%20mushing%20exemption%20in%20AS%2011.61.140(e)%20through%20emergency%20legislation%20so%20cruelty%20laws%20apply%20fully%2C%20no%20more%20shields%20for%20deadly%20contests.%0A3.%20Launch%20an%20independent%20criminal%20investigation%20into%20Ventana's%202025%20death%20and%20other%20fatalities%2Fdrops%2C%20referring%20for%20charges%20where%20neglect%20or%20overexertion%20shows.%0A4.%20Require%20transparent%20public%20reports%20on%20every%20death%2C%20drop%20reason%2C%20necropsy%2C%20and%20actions%20taken.%0A5.%20Condemn%20this%20exploitation%20on%20your%20platforms%20and%20commit%20to%20real%20change%2C%20no%20more%20silence%20or%20defense.%0A%0ADogs%20deserve%20freedom%20from%20pain%2C%20fear%2C%20and%20exploitation%2C%20the%20same%20ideals%20we%20claim%20as%20a%20nation.%20Ventana's%20preventable%20death%20proves%20the%20system%20fails%20them.%0A%0AAct%20now.%20Deliver%20results%20before%20the%202026%20race%20starts.%20We%20expect%20concrete%20steps%20and%20public%20responses.%0A%0ASincerely%2C%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org", RETURN_TO='https://hallieforanimals.org/cta.html';
  function ping(stage){
    try{
      const b=new Blob([JSON.stringify({kind:'email',slug:SLUG,cta_id:CTA_ID,stage})],{type:'application/json'});
      if(navigator.sendBeacon) navigator.sendBeacon('/api/click',b);
      else new Image().src='/api/click?kind=email&slug='+encodeURIComponent(SLUG)+'&stage='+stage+'&t='+Date.now();
    }catch(_){}
  }
  // count land
  ping('open');
  // launch email (after tiny delay to flush beacon)
  setTimeout(()=>{ try{location.replace(MAILTO);}catch{location.href=MAILTO;} },75);

  let redirected=false;
  function goBack(){ if(redirected) return; redirected=true; ping('return'); location.assign(RETURN_TO); }

  // on return from mail client → CTA
  window.addEventListener('focus',()=>setTimeout(goBack,120));
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden) setTimeout(goBack,120); });
  window.addEventListener('pageshow',e=>{ if(e.persisted) setTimeout(goBack,120); });

  document.getElementById('done-return')?.addEventListener('click',e=>{ e.preventDefault(); goBack(); });
})();
