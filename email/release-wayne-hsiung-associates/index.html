0experiments%20injecting%20compounds%20into%20dogs%20to%20test%20effects%20in%20their%20basement%20without%20licenses%20or%20oversight%2C%20they%20would%20face%20immediate%20felony%20animal%20cruelty%20charges%20under%20Wisconsin%20law%20(Wis.%20Stat.%20%C2%A7%20951)%20and%20the%20federal%20Animal%20Welfare%20Act.%20Yet%20licensed%20facilities%20like%20Ridglan%20receive%20legal%20protections%20and%20exemptions%20simply%20because%20they%20hold%20the%20proper%20paperwork.%20This%20double%20standard%20allows%20institutionalized%20cruelty%20while%20punishing%20those%20who%20try%20to%20stop%20it.%20Animals%20in%20these%20facilities%20endure%20conditions%20that%20would%20result%20in%20prosecution%20if%20inflicted%20on%20pet%20dogs.%20%20%0A%0AI%20respectfully%20demand%20that%20you%3A%20%20%0A1.%20Immediately%20drop%20all%20charges%20and%20release%20Wayne%20Hsiung%20and%20the%20other%20activists.%20%20%0A2.%20Launch%20a%20full%20investigation%20into%20Ridglan%20Farms%20for%20violations%20of%20animal%20cruelty%20statutes%2C%20using%20the%20evidence%20provided%20by%20today%E2%80%99s%20rescue.%20%20%0A3.%20Order%20the%20Dane%20County%20Sheriff's%20Office%20to%20return%20the%208%20seized%20beagles%20to%20the%20care%20of%20experienced%20rescuers%20or%20a%20safe%20sanctuary%2C%20ensuring%20they%20are%20not%20returned%20to%20Ridglan%20Farms.%0A4.%20Prioritize%20the%20welfare%20of%20the%20remaining%20beagles%20and%20enforce%20the%20law%20consistently%2C%20without%20favoritism%20toward%20licensed%20experimentation.%20%20%0A%0APublic%20trust%20in%20our%20justice%20system%20requires%20equal%20application%20of%20cruelty%20laws%2C%20regardless%20of%20industry%20protections%20or%20taxpayer%20involvement.%20The%20moral%20and%20fiscal%20case%20against%20continuing%20these%20practices%20is%20clear.%20Please%20act%20swiftly%20and%20provide%20a%20public%20update%20on%20steps%20taken.%20%20%0A%0AThank%20you%20for%20your%20attention%20to%20this%20urgent%20matter.%0A%0ASincerely%2C%0A%0A%40Hall
