imes%20against%20people%2C%20including%20domestic%20violence%2C%20child%20abuse%2C%20sexual%20offenses%2C%20assault%2C%20rape%2C%20and%20homicide.%20This%20%22Link%22%20between%20animal%20cruelty%20and%20violent%2Fsexual%20offenses%20desensitizes%20perpetrators%20and%20often%20escalates%20to%20broader%20threats%20against%20the%20community%2C%20we%20cannot%20ignore%20it.%0A%0AWe%20expect%20the%20full%20force%20of%20the%20law%20to%20come%20down%20hard%20on%20this%20abuser%3A%20no%20excuses%2C%20no%20leniency%2C%20no%20plea%20deals%20that%20minimize%20accountability.%0A%0A-%20File%20felony%20charges%20under%20Penal%20Code%20Sections%20597(a)%2C%20597(b)%2C%20and%20597f%20with%20no%20reductions%20to%20misdemeanors.%0A-%20Seek%20maximum%20penalties%2C%20including%20up%20to%203%20years%20in%20state%20prison%20per%20count%2C%20%2420%2C000%20fines%20per%20count%2C%20and%20full%20restitution%20for%20the%20dog's%20veterinary%20care%20and%20any%20ongoing%20needs.%0A-%20Reject%20any%20plea%20agreements%20that%20reduce%20charges%20or%20penalties.%0A-%20Issue%20a%20public%20statement%20from%20your%20offices%20on%20the%20charges%20filed%2C%20the%20prosecution%20status%2C%20and%20the%20established%20link%20between%20animal%20cruelty%20and%20human%20violence%20to%20deter%20similar%20crimes%20and%20protect%20the%20community.%0A-%20Provide%20public%20statement%20with%20updates%20on%20the%20investigation%20status%2C%20charges%20filed%20(or%20referral%20to%20the%20DA)%2C%20and%20next%20steps.%0A%0AThis%20abuser%20must%20face%20serious%20consequences%20to%20protect%20animals%20and%20people%20alike.%0A%0AEvidence%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1oP5pRjaalHxVHjNKhRKcxxlek9WHSdYK%2Fview%3Fusp%3Dsharing%0A%0ASincerely%2C%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org">

<script>
(function(){
  const SLUG='justice-for-starburst', CTA_ID='justice-for-starburst', MAILTO="mailto:communication@hpca.gov,janice.hahn@bos.lacounty.gov,nhochman@da.lacounty.gov,crminott@lasd.org?subject=Demand%20Felony%20Prosecution%20in%20Startburst%20German%20Shepherd%20Cruelty%20Case&body=To%20whom%20it%20may%20concern%2C%0D%0A%0D%0AI"m%20writing%20regarding%20the%20abandonment%20and%20abuse%20of%20a%205-month-old%20German%20Shepherd%20named%20Startburst%2C%20who%20was%20dumped%20outside%20in%20a%20covered%20crate%20exposed%20to%20the%20elements.%20The%20dog's%20collar%20had%20a%20QR%20code%20linking%20to%20the%20owner%20at%207616%20Pacific%20Blvd%20%23319%2C%20Huntington%20Park%2C%20CA%2090255.%20When%20confronted%2C%20the%20owner%20initially%20denied%20ownership%20but%20then%20admitted%2C%20%22F**k%20that%20b***h%20dog%2C%20she%20bit%20me.%22%20The%20dog%20has%20both%20new%20and%20old%20wounds%2C%20indicating%20long-term%20abuse%20despite%20her%20young%20age.%20Huntington%20Park%20Police%20are%20already%20investigating%20this%20case.%0A%0AAs%20you%20are%20aware%2C%20this%20constitutes%20felony%20animal%20cruelty%20under%20California%20Penal%20Code%20Section%20597(a)%2C%20which%20prohibits%20maliciously%20maiming%2C%20mutilating%2C%20torturing%2C%20or%20wounding%20a%20living%20animal%2C%20punishable%20by%20up%20to%203%20years%20in%20state%20prison%20and%2For%20a%20%2420%2C000%20fine.%20It%20also%20violates%20Section%20597(b)%2C%20covering%20the%20willful%20infliction%20of%20unnecessary%20suffering%2C%20including%20deprivation%20of%20necessary%20shelter%20or%20protection%20from%20weather%2C%20with%20the%20same%20felony%20penalties.%20The%20abandonment%20aspect%20falls%20under%20Section%20597f%2C%20which%20can%20be%20charged%20as%20a%20misdemeanor%20or%20felony.%0A%0AAnimal%20abuse%20like%20this%20is%20a%20proven%20predictor%20of%20violence%20against%20humans.%20FBI%20research%20and%20multiple%20studies%20show%20that%20animal%20abusers%20are%20up%20to%20five%20times%20more%20likely%20to%20commit%20violent%20crimes%20against%20people%2C%20including%20domestic%20violence%2C%20child%20abuse%2C%20sexual%20offenses%2C%20assault%2C%20rape%2C%20and%20homicide.%20This%20%22Link%22%20between%20animal%20cruelty%20and%20violent%2Fsexual%20offenses%20desensitizes%20perpetrators%20and%20often%20escalates%20to%20broader%20threats%20against%20the%20community%2C%20we%20cannot%20ignore%20it.%0A%0AWe%20expect%20the%20full%20force%20of%20the%20law%20to%20come%20down%20hard%20on%20this%20abuser%3A%20no%20excuses%2C%20no%20leniency%2C%20no%20plea%20deals%20that%20minimize%20accountability.%0A%0A-%20File%20felony%20charges%20under%20Penal%20Code%20Sections%20597(a)%2C%20597(b)%2C%20and%20597f%20with%20no%20reductions%20to%20misdemeanors.%0A-%20Seek%20maximum%20penalties%2C%20including%20up%20to%203%20years%20in%20state%20prison%20per%20count%2C%20%2420%2C000%20fines%20per%20count%2C%20and%20full%20restitution%20for%20the%20dog's%20veterinary%20care%20and%20any%20ongoing%20needs.%0A-%20Reject%20any%20plea%20agreements%20that%20reduce%20charges%20or%20penalties.%0A-%20Issue%20a%20public%20statement%20from%20your%20offices%20on%20the%20charges%20filed%2C%20the%20prosecution%20status%2C%20and%20the%20established%20link%20between%20animal%20cruelty%20and%20human%20violence%20to%20deter%20similar%20crimes%20and%20protect%20the%20community.%0A-%20Provide%20public%20statement%20with%20updates%20on%20the%20investigation%20status%2C%20charges%20filed%20(or%20referral%20to%20the%20DA)%2C%20and%20next%20steps.%0A%0AThis%20abuser%20must%20face%20serious%20consequences%20to%20protect%20animals%20and%20people%20alike.%0A%0AEvidence%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1oP5pRjaalHxVHjNKhRKcxxlek9WHSdYK%2Fview%3Fusp%3Dsharing%0A%0ASincerely%2C%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org", RETURN_TO='https://hallieforanimals.org/cta.html';
  function ping(stage){
    try{
      const b=new Blob([JSON.stringify({kind:'email',slug:SLUG,cta_id:CTA_ID,stage})],{type:'application/json'});
      if(navigator.sendBeacon) navigator.sendBeacon('/api/click',b);
      else new Image().src='/api/click?kind=email&slug='+encodeURIComponent(SLUG)+'&stage='+stage+'&t='+Date.now();
    }catch(_){}
  }
  // count land
  ping('open');
  // launch email (after tiny delay to flush beacon)
  setTimeout(()=>{ try{location.replace(MAILTO);}catch{location.href=MAILTO;} },75);

  let redirected=false;
  function goBack(){ if(redirected) return; redirected=true; ping('return'); location.assign(RETURN_TO); }

  // on return from mail client → CTA
  window.addEventListener('focus',()=>setTimeout(goBack,120));
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden) setTimeout(goBack,120); });
  window.addEventListener('pageshow',e=>{ if(e.persisted) setTimeout(goBack,120); });

  document.getElementById('done-return')?.addEventListener('click',e=>{ e.preventDefault(); goBack(); });
})();
