<script>
(function(){
  const SLUG='neglected-dog-at-9016-peachtree-st-houston', CTA_ID='neglected-dog-at-9016-peachtree-st-houston', MAILTO="mailto:Sean.Teare@dao.harriscountytx.gov,jarrad.mears@houstontx.gov,info@houstonspca.org,da@dao.harriscountytx.gov,animalcrueltyunit@houstonpolice.org,animalcruelty@cn1.hctx.net?subject=Seize%20Emaciated%20Dog%20%2B%20Arrest%2FCharge%20Owners%20at%209016%20Peachtree%20St%2C%20Houston%20TX%2077016&body=To%20whom%20it%20may%20concern%2C%0D%0A%0D%0AA%20dog%20kept%20at%209016%20Peachtree%20St%2C%20Houston%2C%20TX%2077016%20(owned%20by%20Charles%20Douglas%2C%20white%202022%20Ford%20F-250%2C%20Texas%20plate%201555985)%20is%20still%20tethered%20outside%2024%2F7%20with%20no%20adequate%20shelter%2C%20no%20food%2C%20and%20no%20water.%20The%20animal%20is%20severely%20emaciated%20-%20ribs%20and%20spine%20clearly%20protruding.%20Animal%20control%20has%20visited%20multiple%20times%20and%20issued%20citations%20with%20zero%20improvement.%20No%20criminal%20charges%20have%20been%20filed%20despite%20repeat%20violations.%20Houston%20SPCA%20has%20been%20notified%20with%20no%20visible%20progress.%0D%0A%0D%0AThis%20is%20ongoing%20neglect%20in%20violation%20of%3A%0D%0A-%20Texas%20Penal%20Code%20Sec.%2042.092(b)(3)%20and%20(b)(6)%3A%20unjustifiably%20failing%20to%20provide%20necessary%20food%2C%20water%2C%20or%20care%2Fshelter%20(Class%20A%20misdemeanor%2C%20escalates%20to%20state%20jail%20felony%20on%20repeat%20or%20if%20serious%20bodily%20injury%20results).%0D%0A-%20Texas%20Health%20%26%20Safety%20Code%20Sec.%20821.101%20et%20seq.%20(Safe%20Outdoor%20Dogs%20Act)%3A%20prohibits%20continuous%20tethering%20without%20access%20to%20drinkable%20water%2C%20adequate%20shade%2Fshelter%2C%20and%20prohibits%20tethering%20that%20injures%20or%20endangers%20the%20animal.%0D%0A%0D%0AAnimal%20neglect%2Fabuse%20is%20a%20proven%20gateway%20to%20human%20violence.%20FBI%20studies%20show%20animal%20abusers%20are%205x%20more%20likely%20to%20commit%20violent%20crimes%20(assault%2C%20domestic%20violence%2C%20sexual%20offenses)%20against%20people.%20Continued%20inaction%20here%20risks%20escalation%20beyond%20the%20animal.%0D%0A%0D%0ADemanded%20Actions%3A%0D%0A-%20Seize%20the%20dog%20immediately%20under%20Health%20%26%20Safety%20Code%20Sec.%20821.022%20for%20emergency%20impoundment%20due%20to%20cruel%20treatment.%0D%0A-%20Arrest%20Charles%20Douglas%20for%20animal%20cruelty%20under%20Penal%20Code%20Sec.%2042.092.%0D%0A-%20File%20charges%20promptly%20-%20no%20more%20citations%20without%20teeth.%0D%0A-%20Provide%20a%20public%20statement%20with%20steps%20taken%2C%20including%20seizure%20date%2Ftime%20and%20any%20arrests%2Fcharges%20filed.%0D%0A%0D%0AEvidence%3A%20https%3A%2F%2Fdrive.google.com%2Fdrive%2Ffolders%2F1B0FZ8AVOeecjfKVNkZNfs_L_pcmJNlkD%3Fusp%3Dsharing%0D%0A%0D%0ASincerely%2C%0D%0A%0D%0A%40HallieForAnimals%20Team%0D%0Acontact%40hallieforanimals.org", RETURN_TO='https://hallieforanimals.org/cta.html';
  function ping(stage){
    try{
      const b=new Blob([JSON.stringify({kind:'email',slug:SLUG,cta_id:CTA_ID,stage})],{type:'application/json'});
      if(navigator.sendBeacon) navigator.sendBeacon('/api/click',b);
      else new Image().src='/api/click?kind=email&slug='+encodeURIComponent(SLUG)+'&stage='+stage+'&t='+Date.now();
    }catch(_){}
  }
  // count land
  ping('open');
  // launch email (after tiny delay to flush beacon)
  setTimeout(()=>{ try{location.replace(MAILTO);}catch{location.href=MAILTO;} },75);

  let redirected=false;
  function goBack(){ if(redirected) return; redirected=true; ping('return'); location.assign(RETURN_TO); }

  // on return from mail client → CTA
  window.addEventListener('focus',()=>setTimeout(goBack,120));
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden) setTimeout(goBack,120); });
  window.addEventListener('pageshow',e=>{ if(e.persisted) setTimeout(goBack,120); });

  document.getElementById('done-return')?.addEventListener('click',e=>{ e.preventDefault(); goBack(); });
})();
</script>
