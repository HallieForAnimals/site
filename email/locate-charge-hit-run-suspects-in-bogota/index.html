<script>
(function(){
  const SLUG='locate-charge-hit-run-suspects-in-bogota', CTA_ID='locate-charge-hit-run-suspects-in-bogota', MAILTO="mailto:defensorciudadanoSDG@gobiernobogota.gov.co,proteccionanimal@animalesbog.gov.co,disciplinarios@animalesbog.gov.co?subject=GLW746%20atropell%C3%B3%20a%20un%20perro%20y%20se%20dio%20a%20la%20fuga%2C%20Britalia%20Bogot%C3%A1%2FGLW746%20Ran%20Over%20Dog%20%26%20Fled%2C%20Britalia%20Bogot%C3%A1&body=A%20quien%20corresponda%3A%0A%0AEl%209%20de%20marzo%2C%20en%20el%20barrio%20de%20Britalia%2C%20en%20Kennedy%20(Bogot%C3%A1)%2C%20el%20conductor%20de%20una%20camioneta%20blanca%20con%20matr%C3%ADcula%20GLW746%20atropell%C3%B3%20a%20un%20perro%20peque%C3%B1o%20que%20yac%C3%ADa%20en%20la%20calle%20y%2C%20a%20continuaci%C3%B3n%2C%20huy%C3%B3%20del%20lugar%20sin%20detenerse%20ni%20prestar%20auxilio%20alguno.%20En%20el%20interior%20del%20veh%C3%ADculo%20viajaban%20dos%20j%C3%B3venes.%0A%0ASe%20trata%20de%20un%20caso%20flagrante%20de%20maltrato%20animal%20y%20de%20atropello%20con%20fuga.%20Todo%20el%20incidente%20qued%C3%B3%20grabado%20en%20v%C3%ADdeo%20y%20la%20matr%C3%ADcula%20se%20ve%20claramente.%0A%0AReivindicaciones%3A%0A-%20localizar%20de%20inmediato%20la%20matr%C3%ADcula%20GLW746%0A-%20identificar%20al%20conductor%20y%20a%20los%20pasajeros%0A-%20presentar%20cargos%20penales%20en%20virtud%20de%20la%20Ley%201774%20de%202016%20(maltrato%20animal)%20y%20las%20disposiciones%20pertinentes%20sobre%20atropello%20con%20fuga.%0A%0ALa%20comunidad%20espera%20medidas%20concretas%20y%20que%20se%20aplique%20todo%20el%20peso%20de%20la%20ley.%0A%0APruebas%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F18zGZwpKBVoBbWiTs2y_DMWerUm7miJ0C%2Fview%3Fusp%3Dsharing%0A%0AAtentamente%2C%0A%0AEl%20equipo%20de%20%40HallieForAniamls%0Acontact%40hallieforanimals.org%0A%0A%0A%0ATo%20whom%20it%20may%20concern%2C%0A%0AOn%20March%209%2C%20in%20the%20Britalia%20neighborhood%20of%20Kennedy%2C%20Bogota%2C%20the%20driver%20of%20a%20white%20pickup%20truck%20with%20license%20plate%20GLW746%20ran%20over%20a%20small%20dog%20that%20was%20lying%20in%20the%20street%20and%20then%20fled%20the%20scene%20without%20stopping%20or%20providing%20any%20aid.%20Two%20young%20people%20were%20inside%20the%20vehicle.%0A%0AThis%20is%20blatant%20animal%20cruelty%20and%20hit-and-run.%20The%20entire%20incident%20is%20captured%20on%20video%20and%20the%20plate%20is%20clearly%20visible.%0A%0ADemands%3A%0A-%20immediately%20trace%20the%20plate%20GLW746%0A-%20identify%20the%20driver%20and%20passengers%0A-%20file%20criminal%20charges%20under%20Ley%201774%20de%202016%20(animal%20abuse)%20and%20relevant%20hit-and-run%20provisions.%0A%0AThe%20community%20expects%20real%20action%20and%20prosecution%20with%20the%20full%20weight%20of%20the%20law.%0A%0AEvidence%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F18zGZwpKBVoBbWiTs2y_DMWerUm7miJ0C%2Fview%3Fusp%3Dsharing%0A%0ASincerely%2C%0A%0A%40HallieForAniamls%20Team%0Acontact%40hallieforanimals.org", RETURN_TO='https://hallieforanimals.org/cta.html';
  function ping(stage){
    try{
      const b=new Blob([JSON.stringify({kind:'email',slug:SLUG,cta_id:CTA_ID,stage})],{type:'application/json'});
      if(navigator.sendBeacon) navigator.sendBeacon('/api/click',b);
      else new Image().src='/api/click?kind=email&slug='+encodeURIComponent(SLUG)+'&stage='+stage+'&t='+Date.now();
    }catch(_){}
  }
  // count land
  ping('open');
  // launch email (after tiny delay to flush beacon)
  setTimeout(()=>{ try{location.replace(MAILTO);}catch{location.href=MAILTO;} },75);

  let redirected=false;
  function goBack(){ if(redirected) return; redirected=true; ping('return'); location.assign(RETURN_TO); }

  // on return from mail client → CTA
  window.addEventListener('focus',()=>setTimeout(goBack,120));
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden) setTimeout(goBack,120); });
  window.addEventListener('pageshow',e=>{ if(e.persisted) setTimeout(goBack,120); });

  document.getElementById('done-return')?.addEventListener('click',e=>{ e.preventDefault(); goBack(); });
})();
