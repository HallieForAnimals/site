20media%2Fpublic%20complaints.%20This%20is%20blatant%20**cruelty**%20under%20**Prevention%20of%20Cruelty%20to%20Animals%20Act%2C%201960%2C%20Section%2011(1)(a)**%3A%20beating%2C%20kicking%2C%20overriding%2C%20or%20otherwise%20inflicting%20unnecessary%20pain%2Fsuffering%20(cognizable%20offense%20with%20fines%2Fimprisonment).%0A%0AAnimal%20cruelty%20is%20a%20proven%20indicator%20and%20predictor%20of%20violent%20and%20sexual%20offenses%20against%20humans%20(supported%20by%20extensive%20research%2C%20including%20FBI%20behavioral%20studies%20linking%20animal%20abuse%20to%20higher%20risks%20of%20interpersonal%20violence%2C%20domestic%20abuse%2C%20and%20sexual%20crimes).%0A%0AWe%20demand%20immediate%3A%0A1.%20Arrest%20and%20formal%20charges%20against%20the%20accused%20under%20PCA%20Act%20Section%2011.%0A2.%20Seizure%20of%20any%20animals%20in%20their%20possession.%0A3.%20Coordination%20with%20Animal%20Husbandry%2FAWBI%20for%20welfare%20and%20prosecution.%0A4.%20Public%20update%20on%20investigation%20and%20actions%20taken.%0A%0AFailure%20to%20act%20normalized%20violence.%0A%0AEvidence%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1XCXnHOCr68vOq5rjrCuQkRRRi1GHMUsw%2Fview%3Fusp%3Dsharing%0A%0ASincerely%2C%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org", RETURN_TO='https://hallieforanimals.org/cta.html';
  function ping(stage){
    try{
      const b=new Blob([JSON.stringify({kind:'email',slug:SLUG,cta_id:CTA_ID,stage})],{type:'application/json'});

    }catch(_){}
  }

  ping('open');

  setTimeout(()=>{ try{location.replace(MAILTO);}catch{location.href=MAILTO;} },75);
