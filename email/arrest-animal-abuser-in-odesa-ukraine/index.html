0(involve%20State%20Service%20of%20Ukraine%20on%20Food%20Safety%20and%20Consumer%20Protection%20if%20needed).%0A3.%20Seizure%2Fprotection%20of%20the%20dog(s)%20if%20neglect%2Fabuse%20confirmed%2C%20do%20not%20return%20them%20to%20the%20owner.%0A4.%20Initiate%20criminal%20proceedings%20under%20Article%20299%20CCU%20(and%20related%20articles%20if%20applicable).%0A5.%20Investigate%20fully%20to%20prevent%20recurrence%20and%20protect%20public%20safety.%0A%0ATime%20is%20critical%2C%20the%20animal%20may%20die%20soon%20without%20intervention.%20Act%20now.%0A%0AEvidence%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1U-wuxFaQvESrK6LV1BwNFNZ_GI0DRnJu%2Fview%3Fusp%3Dsharing%0A%0ASincerely%2C%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org", RETURN_TO='https://hallieforanimals.org/cta.html';
  function ping(stage){
    try{
      const b=new Blob([JSON.stringify({kind:'email',slug:SLUG,cta_id:CTA_ID,stage})],{type:'application/json'});
      if(navigator.sendBeacon) navigator.sendBeacon('/api/click',b);
      else new Image().src='/api/click?kind=email&slug='+encodeURIComponent(SLUG)+'&stage='+stage+'&t='+Date.now();
    }catch(_){}
  }
  // count land
  ping('open');
  // launch email (after tiny delay to flush beacon)
  setTimeout(()=>{ try{location.replace(MAILTO);}catch{location.href=MAILTO;} },75);

  let redirected=false;
  function goBack(){ if(redirected) return; redirected=true; ping('return'); location.assign(RETURN_TO); }

  // on return from mail client → CTA
  window.addEventListener('focus',()=>setTimeout(goBack,120));
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden) setTimeout(goBack,120); });
  window.addEventListener('pageshow',e=>{ if(e.persisted) setTimeout(goBack,120); });

  document.getElementById('done-return')?.addEventListener('click',e=>{ e.preventDefault(); goBack(); });
})();
