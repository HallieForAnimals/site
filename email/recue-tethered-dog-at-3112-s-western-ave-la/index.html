<script>
(function(){
  const SLUG='recue-tethered-dog-at-3112-s-western-ave-la', CTA_ID='recue-tethered-dog-at-3112-s-western-ave-la', MAILTO="mailto:karen.bass@lactiy.org,annette.ramirez@lacity.org,laanimalservices@lacity.org?subject=Dog%20Left%20Tied%20Outside%20in%20Extreme%20Heat%20at%203112%20S%20Western%20Ave&body=To%20whom%20it%20may%20concern%2C%0A%0AI%20am%20writing%20to%20report%20clear%20animal%20neglect%20and%20abuse%20at%203112%20S%20Western%20Ave%2C%20Los%20Angeles%2C%20CA%2090018.%20A%20dog%20has%20been%20tied%20up%20outside%20this%20property%20all%20day%20in%20temperatures%20reaching%2090F%20and%20remains%20there%20into%20the%20night%20with%20no%20adequate%20shade%2C%20water%2C%20or%20relief%20from%20the%20heat.%0A%0AThis%20is%20not%20an%20isolated%20case.%20It%20is%20part%20of%20a%20growing%20pattern%20in%20Los%20Angeles%20where%20animal%20cruelty%20and%20neglect%20go%20unaddressed%2C%20making%20the%20city's%20animal%20welfare%20enforcement%20a%20joke.%0A%0ALeaving%20a%20dog%20tethered%20in%20extreme%20heat%20without%20proper%20care%20violates%20Los%20Angeles%20Municipal%20Code%20and%20California%20law.%20California%20Penal%20Code%20allows%20peace%20officers%20and%20animal%20control%20officers%20to%20seize%20and%20impound%20an%20animal%20based%20on%20suspected%20abuse%20or%20neglect%20when%20there%20is%20reasonable%20belief%20that%20prompt%20action%20is%20needed%20to%20protect%20the%20animal's%20health%20or%20safety.%20Confirmation%20of%20abuse%20is%20not%20required%20for%20immediate%20intervention.%0A%0AI%20and%20many%20concerned%20residents%20demand%20that%20LA%20Animal%20Services%20take%20immediate%20action%3A%0A%0A-%20Dispatch%20officers%20to%203112%20S%20Western%20Ave%20today%20to%20check%20on%20the%20dog%20and%20seize%20it%20from%20the%20harmful%20situation%20if%20needed.%0A-%20Investigate%20the%20owners%20and%20hold%20them%20fully%20accountable%20under%20the%20law.%0A-%20Resolve%20this%20case%20promptly.%0A%0ACitizen%20of%20Los%20Angeles%20and%20beyond%20are%20tired%20of%20repeated%20failures%20by%20LA%20Animal%20Services%20to%20protect%20animals%20in%20distress.%20This%20situation%20must%20be%20sorted%20out%20now%20with%20no%20more%20excuses.%0A%0AThank%20you%20for%20your%20urgent%20attention%20to%20this%20matter.%0A%0AEvidence%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F11DspwgrsXU5lCAhj_3UcAyWxi3eTwroC%2Fview%3Fusp%3Dsharing%0A%0ASincerely%2C%0A%0A%40HallieForAniamls%20Team%0Acontact%40hallieforanimals.org", RETURN_TO='https://hallieforanimals.org/cta.html';
  function ping(stage){
    try{
      const b=new Blob([JSON.stringify({kind:'email',slug:SLUG,cta_id:CTA_ID,stage})],{type:'application/json'});
      if(navigator.sendBeacon) navigator.sendBeacon('/api/click',b);
      else new Image().src='/api/click?kind=email&slug='+encodeURIComponent(SLUG)+'&stage='+stage+'&t='+Date.now();
    }catch(_){}
  }
  // count land
  ping('open');
  // launch email (after tiny delay to flush beacon)
  setTimeout(()=>{ try{location.replace(MAILTO);}catch{location.href=MAILTO;} },75);

  let redirected=false;
  function goBack(){ if(redirected) return; redirected=true; ping('return'); location.assign(RETURN_TO); }

  // on return from mail client → CTA
  window.addEventListener('focus',()=>setTimeout(goBack,120));
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden) setTimeout(goBack,120); });
  window.addEventListener('pageshow',e=>{ if(e.persisted) setTimeout(goBack,120); });

  document.getElementById('done-return')?.addEventListener('click',e=>{ e.preventDefault(); goBack(); });
})();
</script>
