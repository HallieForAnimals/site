<script>
(function(){
  const SLUG='justice-for-louie', CTA_ID='justice-for-louie', MAILTO="mailto:shelterinfo@rivco.org,mhestrin@rivcoda.org,brobinson@calvaryrealty.com,officeofthechief@beaumontpd.org?subject=Immediate%20Charges%20For%20Brandon%20Robinson&body=To%20whom%20it%20may%20concern%2C%0A%0ABrandon%20Robinson%20(licensed%20realtor%20and%20owner%20of%20Calvary%20Realty%2C%20DRE%20%2301787727)%20of%2011376%20Aaron%20Ave%2C%20Beaumont%2C%20CA%2092223%2C%20stabbed%20a%20French%20Bulldog%20named%20Louie%20to%20death%20on%20the%20dog's%20own%20lawn%2Fproperty.%20This%20is%20felony%20animal%20cruelty%20under%20California%20Penal%20Code%20%C2%A7597(a)%2C%20maliciously%20maiming%2C%20wounding%2C%20or%20killing%20an%20animal%2C%20punishable%20by%20up%20to%203%20years%20in%20state%20prison%20and%2For%20a%20%2420%2C000%20fine.%0A%0AAnimal%20abusers%20are%20up%20to%205%20times%20more%20likely%20to%20commit%20violent%20and%20sexual%20offenses%20against%20humans.%20Research%20consistently%20shows%20escalation%20from%20animal%20cruelty%20to%20interpersonal%20violence%2C%20domestic%20abuse%2C%20assault%2C%20and%20sexual%20crimes.%20Allowing%20realtors%20with%20this%20history%20to%20interact%20with%20clients%20and%20the%20public%20creates%20unacceptable%20risk.%0A%0AWe%20demand%3A%0A-%20Immediate%20filing%20of%20felony%20charges%20against%20Brandon%20Robinson%20under%20Penal%20Code%20%C2%A7597(a)%0A-%20Full%20criminal%20investigation%2C%20including%20seizure%20of%20any%20weapons%2C%20necropsy%2Fveterinary%20records%2C%20and%20witness%20statements%0A-%20California%20Department%20of%20Real%20Estate%20to%20open%20an%20investigation%20into%20both%20licensees'%20moral%20character%20and%20fitness%20(separate%20complaint%20will%20be%20filed%20via%20eocs.dre.ca.gov)%0A-%20Public%20statements%20from%20the%20District%20Attorney's%20Office%20and%20Beaumont%20Police%20Department%20confirming%20the%20case%20is%20under%20active%20investigation%20and%20outlining%20next%20steps%0A%0AWe%20expect%20swift%20enforcement%20and%20public%20transparency.%0A%0AEvidence%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1MVpAOK2TDQ0F3N2BJivZdOSGM4eX7b6u%2Fview%3Fusp%3Dsharing%0A%0ASincerely%2C%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org", RETURN_TO='https://hallieforanimals.org/cta.html';
  function ping(stage){
    try{
      const b=new Blob([JSON.stringify({kind:'email',slug:SLUG,cta_id:CTA_ID,stage})],{type:'application/json'});
      if(navigator.sendBeacon) navigator.sendBeacon('/api/click',b);
      else new Image().src='/api/click?kind=email&slug='+encodeURIComponent(SLUG)+'&stage='+stage+'&t='+Date.now();
    }catch(_){}
  }
  // count land
  ping('open');
  // launch email (after tiny delay to flush beacon)
  setTimeout(()=>{ try{location.replace(MAILTO);}catch{location.href=MAILTO;} },75);

  let redirected=false;
  function goBack(){ if(redirected) return; redirected=true; ping('return'); location.assign(RETURN_TO); }

  // on return from mail client → CTA
  window.addEventListener('focus',()=>setTimeout(goBack,120));
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden) setTimeout(goBack,120); });
  window.addEventListener('pageshow',e=>{ if(e.persisted) setTimeout(goBack,120); });

  document.getElementById('done-return')?.addEventListener('click',e=>{ e.preventDefault(); goBack(); });
})();
</script>
