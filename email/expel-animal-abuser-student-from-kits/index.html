A%0A%0ATo%20the%20University%20Administration%3A%20%20%0A%0A1.%20Expand%20the%20internal%20investigation%20(using%20video%2C%20hostel%20records%2C%20witness%20statements)%20to%20identify%20and%20name%20all%20accomplices%20and%20enablers.%20%20%0A2.%20Permanently%20expel%20every%20individual%20found%20involved%20(including%20those%20who%20recorded%20or%20failed%20to%20act)%20and%20bar%20them%20from%20future%20enrollment%20or%20campus%20access.%20%20%0A3.%20Implement%20mandatory%20animal%20welfare%2C%20ethics%2C%20and%20empathy%20training%20for%20all%20students%2Fhostel%20residents.%20%20%0A4.%20Issue%20a%20public%20statement%20detailing%20actions%20against%20all%20parties%20and%20reaffirming%20zero%20tolerance%20for%20cruelty.%0A%0ATo%20the%20Coimbatore%20Police%3A%20%20%0A%0A1.%20Swiftly%20expand%20the%20existing%20FIR%20investigation%20to%20identify%20and%20charge%20all%20culpable%20individuals%20(perpetrator%20%2B%20accomplices%2Fabetters).%20%20%0A2.%20File%20a%20chargesheet%20promptly%2C%20pursuing%20maximum%20penalties%20(fines%2C%20imprisonment%20where%20evidence%20supports).%20%20%0A3.%20Coordinate%20with%20KITS%20for%20evidence%20(e.g.%2C%20video%2C%20student%20details)%20and%20provide%20public%20updates%20on%20progress.%0A%0ASuch%20collective%20cruelty%20demonstrates%20a%20profound%20failure%20of%20empathy%20and%20ethics%20-%20values%20central%20to%20any%20educational%20institution.%20Harsh%2C%20group-wide%20consequences%20are%20essential%20for%20justice%2C%20public%20trust%2C%20and%20protection%20of%20voiceless%20animals.%0A%0AThank%20you%20for%20your%20immediate%20action.%20Please%20issue%20updates%20on%20the%20investigation%20and%20steps%20taken.%0A%0AEvidence%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1rF6o3OOnhjwks_EqGLR6que4OvTiTfqN%2Fview%3Fusp%3Dsharing%0A%0ASincerely%2C%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org">

<script>
(function(){
  const SLUG='expel-animal-abuser-student-from-kits', CTA_ID='expel-animal-abuser-student-from-kits', MAILTO="mailto:elijahblessing@karunya.edu,pauldhinakaran@karunya.edu,sajankurien@karunya.edu,cop.cbec@tncctns.gov.in?subject=Full%20Investigation%2C%20Criminal%20Charges%2C%20and%20Permanent%20Expulsion%20for%20ALL%20Involved%20in%20KITS%20Kitten%20Cruelty%20Incident&body=To%20whom%20it%20may%20concern%2C%0A%0AI%20am%20writing%20as%20a%20deeply%20concerned%20citizen%20and%20advocate%20for%20animal%20welfare%20regarding%20the%20horrific%20animal%20cruelty%20incident%20at%20Karunya%20Institute%20of%20Technology%20and%20Sciences%20(KITS)%2C%20Coimbatore%2C%20captured%20on%20video%20in%20March%202026.%0AA%20student%20deliberately%20threw%20a%20kitten%20from%20the%20third-floor%20balcony%2C%20causing%20grievous%20harm%20or%20death%2C%20while%20others%20present%20recorded%20it%20mockingly%20(e.g.%2C%20with%20captions%20like%20%22Helicopter%20helicopter%22)%2C%20laughed%2C%20and%20failed%20to%20intervene.%0A%0APublic%20outrage%20has%20highlighted%20that%20this%20was%20a%20group%20act%20involving%3A%20%20%0A-%20The%20primary%20perpetrator%20%20%0A-%20At%20least%20one%20other%20individual%20visible%20in%20the%20background%20%20%0A-%20The%20person%20recording%2Fvideoing%20for%20social%20media%2F%22reels%22%20%20%0A-%20Additional%20bystanders%20who%20witnessed%2C%20encouraged%2C%20or%20did%20nothing%20to%20stop%20it%0A%0AWhile%20a%20suspension%20memo%20(dated%20March%2013%2C%202026)%20has%20been%20issued%20for%20the%20primary%20student%2C%20this%20interim%20measure%20is%20insufficient%20without%20escalation%20to%20permanent%20expulsion.%20All%20involved%20must%20face%20full%20accountability%20to%20reflect%20the%20severity%20of%20premeditated%20cruelty%20to%20a%20defenseless%20animal%20and%20to%20deter%20future%20incidents.%0A%0AUnder%20India's%20Prevention%20of%20Cruelty%20to%20Animals%20Act%2C%201960%20(Sections%2011%20for%20cruelty%20and%20abetment%20liability)%2C%20and%20the%20university's%20code%20of%20conduct%2C%20I%20urgently%20request%3A%0A%0ATo%20the%20University%20Administration%3A%20%20%0A%0A1.%20Expand%20the%20internal%20investigation%20(using%20video%2C%20hostel%20records%2C%20witness%20statements)%20to%20identify%20and%20name%20all%20accomplices%20and%20enablers.%20%20%0A2.%20Permanently%20expel%20every%20individual%20found%20involved%20(including%20those%20who%20recorded%20or%20failed%20to%20act)%20and%20bar%20them%20from%20future%20enrollment%20or%20campus%20access.%20%20%0A3.%20Implement%20mandatory%20animal%20welfare%2C%20ethics%2C%20and%20empathy%20training%20for%20all%20students%2Fhostel%20residents.%20%20%0A4.%20Issue%20a%20public%20statement%20detailing%20actions%20against%20all%20parties%20and%20reaffirming%20zero%20tolerance%20for%20cruelty.%0A%0ATo%20the%20Coimbatore%20Police%3A%20%20%0A%0A1.%20Swiftly%20expand%20the%20existing%20FIR%20investigation%20to%20identify%20and%20charge%20all%20culpable%20individuals%20(perpetrator%20%2B%20accomplices%2Fabetters).%20%20%0A2.%20File%20a%20chargesheet%20promptly%2C%20pursuing%20maximum%20penalties%20(fines%2C%20imprisonment%20where%20evidence%20supports).%20%20%0A3.%20Coordinate%20with%20KITS%20for%20evidence%20(e.g.%2C%20video%2C%20student%20details)%20and%20provide%20public%20updates%20on%20progress.%0A%0ASuch%20collective%20cruelty%20demonstrates%20a%20profound%20failure%20of%20empathy%20and%20ethics%20-%20values%20central%20to%20any%20educational%20institution.%20Harsh%2C%20group-wide%20consequences%20are%20essential%20for%20justice%2C%20public%20trust%2C%20and%20protection%20of%20voiceless%20animals.%0A%0AThank%20you%20for%20your%20immediate%20action.%20Please%20issue%20updates%20on%20the%20investigation%20and%20steps%20taken.%0A%0AEvidence%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1rF6o3OOnhjwks_EqGLR6que4OvTiTfqN%2Fview%3Fusp%3Dsharing%0A%0ASincerely%2C%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org", RETURN_TO='https://hallieforanimals.org/cta.html';
  function ping(stage){
    try{
      const b=new Blob([JSON.stringify({kind:'email',slug:SLUG,cta_id:CTA_ID,stage})],{type:'application/json'});
      if(navigator.sendBeacon) navigator.sendBeacon('/api/click',b);
      else new Image().src='/api/click?kind=email&slug='+encodeURIComponent(SLUG)+'&stage='+stage+'&t='+Date.now();
    }catch(_){}
  }
  // count land
  ping('open');
  // launch email (after tiny delay to flush beacon)
  setTimeout(()=>{ try{location.replace(MAILTO);}catch{location.href=MAILTO;} },75);

  let redirected=false;
  function goBack(){ if(redirected) return; redirected=true; ping('return'); location.assign(RETURN_TO); }

  // on return from mail client → CTA
  window.addEventListener('focus',()=>setTimeout(goBack,120));
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden) setTimeout(goBack,120); });
  window.addEventListener('pageshow',e=>{ if(e.persisted) setTimeout(goBack,120); });

  document.getElementById('done-return')?.addEventListener('click',e=>{ e.preventDefault(); goBack(); });
})();
</script>
