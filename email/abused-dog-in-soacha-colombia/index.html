bles%20y%20el%20protocolo%20para%20casos%20de%20maltrato%20en%20curso%20o%20riesgo%20de%20muerte.%0A%0ASolicitud%20espec%C3%ADfica%20de%20actuaci%C3%B3n%20inmediata%3A%0A1.%20Inspecci%C3%B3n%20urgente%20por%20parte%20de%20la%20Secretar%C3%ADa%20de%20Gobierno%20%2F%20Control%20Urbano%20%2F%20Polic%C3%ADa%20Ambiental%20de%20Soacha%20para%20verificar%20el%20estado%20del%20animal%20y%20proceder%20a%20su%20incautaci%C3%B3n%2Fretirada%20si%20se%20confirma%20la%20crueldad%20(tal%20y%20como%20exige%20la%20ley).%0A2.%20Inicio%20de%20una%20investigaci%C3%B3n%20administrativa%20y%20coordinaci%C3%B3n%20con%20la%20Fiscal%C3%ADa%20para%20presentar%20una%20denuncia%20penal%20(delito%20contra%20la%20integridad%20animal).%0A3.%20Notificaci%C3%B3n%20a%20la%20parte%20responsable%20y%20aplicaci%C3%B3n%20de%20sanciones%20(multas%2C%20incautaci%C3%B3n%2C%20prohibici%C3%B3n%20de%20tenencia%20de%20animales).%0A%0AEste%20caso%20ya%20est%C3%A1%20circulando%20en%20las%20redes%20sociales%20y%20entre%20los%20grupos%20de%20protecci%C3%B3n%20animal%2C%20generando%20indignaci%C3%B3n%20p%C3%BAblica.%20Es%20imperativo%20actuar%20con%20rapidez%20para%20evitar%20m%C3%A1s%20sufrimiento%20o%20la%20muerte%20del%20animal.%0A%0APruebas%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1NVcqrRGD_n9VDtIA3AY0RTSi_C4Gje15%2Fview%3Fusp%3Dsharing%0A%0AAtentamente%2C%0A%0AEl%20equipo%20de%20%40HallieForAnimals%0Acontact%40hallieforanimals.org%0A%0A%0ATo%20whom%20it%20may%20concern%2C%0A%0AI%20am%20writing%20to%20you%20urgently%20to%20report%20an%20ongoing%20and%20flagrant%20case%20of%20animal%20cruelty%20at%20the%20following%20address%3A%20Calle%2045%20%23%2012-26%2C%20Barrio%20Julio%20Rincon%2C%20Soacha%2C%20Cundinamarca.%0A%0AA%20dog%20is%20being%20subjected%20to%20extreme%20cruelty%3A%0A-%20Kept%20permanently%20muzzled%20(causing%20suffering%2C%20difficulty%20eating%2Fdrinking%2C%20and%20likely%20injuries).%0A-%20Beaten%20daily%20(there%20is%20video%20evidence%20showing%20physical%20assaults).%0A-%20Constant%20 to%20contradice%20las%20pruebas%20visuales%20disponibles%20y%20el%20protocolo%20para%20casos%20de%20maltrato%20en%20curso%20o%20riesgo%20de%20muerte.%0A%0ASolicitud%20espec%C3%ADfica%20de%20actuaci%C3%B3n%20inmediata%3A%0A1.%20Inspecci%C3%B3n%20urgente%20por%20parte%20de%20la%20Secretar%C3%ADa%20de%20Gobierno%20%2F%20Control%20Urbano%20%2F%20Polic%C3%ADa%20Ambiental%20de%20Soacha%20para%20verificar%20el%20estado%20del%20animal%20y%20proceder%20a%20su%20incautaci%C3%B3n%2Fretirada%20si%20se%20confirma%20la%20crueldad%20(tal%20y%20como%20exige%20la%20ley).%0A2.%20Inicio%20de%20una%20investigaci%C3%B3n%20administrativa%20y%20coordinaci%C3%B3n%20con%20la%20Fiscal%C3%ADa%20para%20presentar%20una%20denuncia%20penal%20(delito%20contra%20la%20integridad%20animal).%0A3.%20Notificaci%C3%B3n%20a%20la%20parte%20responsable%20y%20aplicaci%C3%B3n%20de%20sanciones%20(multas%2C%20incautaci%C3%B3n%2C%20prohibici%C3%B3n%20de%20tenencia%20de%20animales).%0A%0AEste%20caso%20ya%20est%C3%A1%20circulando%20en%20las%20redes%20sociales%20y%20entre%20los%20grupos%20de%20protecci%C3%B3n%20animal%2C%20generando%20indignaci%C3%B3n%20p%C3%BAblica.%20Es%20imperativo%20actuar%20con%20rapidez%20para%20evitar%20m%C3%A1s%20sufrimiento%20o%20la%20muerte%20del%20animal.%0A%0APruebas%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1NVcqrRGD_n9VDtIA3AY0RTSi_C4Gje15%2Fview%3Fusp%3Dsharing%0A%0AAtentamente%2C%0A%0AEl%20equipo%20de%20%40HallieForAnimals%0Acontact%40hallieforanimals.org%0A%0A%0ATo%20whom%20it%20may%20concern%2C%0A%0AI%20am%20writing%20to%20you%20urgently%20to%20report%20an%20ongoing%20and%20flagrant%20case%20of%20animal%20cruelty%20at%20the%20following%20address%3A%20Calle%2045%20%23%2012-26%2C%20Barrio%20Julio%20Rincon%2C%20Soacha%2C%20Cundinamarca.%0A%0AA%20dog%20is%20being%20subjected%20to%20extreme%20cruelty%3A%0A-%20Kept%20permanently%20muzzled%20(causing%20suffering%2C%20difficulty%20eating%2Fdrinking%2C%20and%20likely%20injuries).%0A-%20Beaten%20daily%20(there%20is%20video%20evidence%20showing%20physical%20assaults).%0A-%20Constant%20exposure%20without%20adequate%20protection%2C%20lacking%20consistent%20access%20to%20water%2Ffood%2Fshade%20(conditions%20of%20neglect%20and%20abandonment).%0A%0AThis%20abuse%20occurs%20every%20day%20and%20poses%20an%20imminent%20risk%20to%20the%20animal's%20life%20and%20well-being%2C%20constituting%20criminal%20offenses%20under%20Law%201774%20of%202016%20(amended%20by%20Law%202455%20of%202025)%2C%20which%20classifies%20animal%20cruelty%20as%20a%20punishable%20crime%20with%20prison%20sentences%20and%20fines.%0A%0APrevious%20facts%3A%0A-%20The%20National%20Police%20already%20visited%20the%20location%20following%20initial%20reports%2C%20observed%20the%20animal's%20condition%20and%20video%20evidence%2C%20but%20determined%20%22no%20abuse%22%20and%20left%20without%20taking%20any%20action%20or%20filing%20a%20report.%20This%20contradicts%20the%20available%20visual%20evidence%20and%20the%20protocol%20for%20cases%20of%20in-progress%20cruelty%20or%20life-threatening%20risk.%0A%0ASpecific%20request%20for%20immediate%20action%3A%0A1.%20Urgent%20inspection%20by%20the%20Secretariat%20of%20Government%20%2F%20Urban%20Control%20%2F%20Environmental%20Police%20of%20Soacha%20to%20verify%20the%20animal's%20condition%20and%20proceed%20with%20seizure%2Fremoval%20if%20cruelty%20is%20confirmed%20(as%20required%20by%20law).%0A2.%20Initiation%20of%20an%20administrative%20investigation%20and%20coordination%20with%20the%20Prosecutor's%20Office%20for%20a%20criminal%20complaint%20(crime%20against%20animal%20integrity).%0A3.%20Notification%20to%20the%20responsible%20party%20and%20application%20of%20sanctions%20(fines%2C%20seizure%2C%20prohibition%20of%20animal%20ownership).%0A%0AThis%20case%20is%20already%20circulating%20on%20social%20media%20and%20animal%20protection%20groups%2C%20generating%20public%20outrage.%20It%20is%20imperative%20to%20act%20quickly%20to%20prevent%20further%20suffering%20or%20the%20animal's%20death.%0A%0AEvidence%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1NVcqrRGD_n9VDtIA3AY0RTSi_C4Gje15%2Fview%3Fusp%3Dsharing%0A%0ASincerely%2C%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org", RETURN_TO='https://hallieforanimals.org/cta.html';
  function ping(stage){
    try{
      const b=new Blob([JSON.stringify({kind:'email',slug:SLUG,cta_id:CTA_ID,stage})],{type:'application/json'});
      if(navigator.sendBeacon) navigator.sendBeacon('/api/click',b);
      else new Image().src='/api/click?kind=email&slug='+encodeURIComponent(SLUG)+'&stage='+stage+'&t='+Date.now();
    }catch(_){}
  }
  // count land
  ping('open');
  // launch email (after tiny delay to flush beacon)
  setTimeout(()=>{ try{location.replace(MAILTO);}catch{location.href=MAILTO;} },75);

  let redirected=false;
  function goBack(){ if(redirected) return; redirected=true; ping('return'); location.assign(RETURN_TO); }

  // on return from mail client → CTA
  window.addEventListener('focus',()=>setTimeout(goBack,120));
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden) setTimeout(goBack,120); });
  window.addEventListener('pageshow',e=>{ if(e.persisted) setTimeout(goBack,120); });

  document.getElementById('done-return')?.addEventListener('click',e=>{ e.preventDefault(); goBack(); });
})();
</script>
