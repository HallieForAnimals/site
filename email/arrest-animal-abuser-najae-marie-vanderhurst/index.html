(function(){
  const SLUG='arrest-animal-abuser-najae-marie-vanderhurst', CTA_ID='arrest-animal-abuser-najae-marie-vanderhurst', MAILTO="mailto:demingj@douglasvillega.gov,animalcontrol@douglascountyga.gov,sparksg@douglasvillega.gov,davidsnj@douglasvillega.gov?subject=Arrest%20Animal%20Abuser%20Najae%20Marie%20Vanderhurst&body=To%20whom%20it%20may%20concern%2C%0A%0AI%20am%20writing%20as%20a%20concerned%20citizen%20to%20formally%20request%20a%20prompt%20investigation%20into%20allegations%20of%20animal%20cruelty%20involving%20Najae%20Marie%20Vanderhurst%20of%20Douglasville%2C%20Georgia.%0A%0AAccording%20to%20public%20reports%20and%20a%20captured%20video%20from%20her%20Instagram%20story%20(posted%20around%203%20PM%20on%20or%20about%20the%20date%20referenced%20in%20recent%20posts)%2C%20Ms.%20Vanderhurst%20appears%20to%20be%20pouring%20water%20on%20a%20dog's%20head%20while%20the%20animal%20is%20confined%20in%20a%20very%20small%20cage.%20She%20reportedly%20captioned%20or%20commented%20on%20the%20video%20with%20statements%20indicating%20frustration%20and%20intent%2C%20such%20as%20%22I%20hate%20this%20dog...%20all%20she%20do%20is%20bark%20and%20that's%20why%20I%20wet%20her%20stupid%20ass%20up!%22%20A%20child%20is%20also%20visible%20laughing%20in%20the%20video.%20The%20video%20has%20since%20been%20deleted%2C%20but%20screenshots%20and%20recordings%20have%20been%20shared%20online.%0A%0AUnder%20Georgia%20law%20(O.C.G.A.%20Section%2016-12-4)%2C%20animal%20cruelty%20is%20a%20serious%20offense%2C%20and%20acts%20involving%20unnecessary%20physical%20harm%2C%20confinement%20in%20inadequate%20conditions%2C%20or%20abusive%20treatment%20warrant%20investigation.%20The%20presence%20of%20a%20minor%20in%20the%20video%20also%20raises%20additional%20concerns%20regarding%20the%20environment.%0A%0AI%20urge%20your%20agency%20to%3A%0A-%20Immediately%20investigate%20these%20allegations.%0A-%20Locate%20and%20check%20the%20welfare%20of%20the%20dog%20involved.%0A-%20Review%20any%20available%20evidence%2C%20including%20the%20captured%20video%20and%20related%20social%20media%20posts.%0A-%20Take%20appropriate%20enforcement%20action%20if%20violations%20are%20confirmed%2C%20including%20potential%20criminal%20charges.%0A%0AThank%20you%20for%20your%20attention%20to%20this%20important%20animal%20welfare%20issue.%0A%0AEvidence%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1rWXiVBndfyZ8SjUT1xX5KYtzQXzOzinT%2Fview%3Fusp%3Dsharing%0A%0ASincerely%2C%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org", RETURN_TO='https://hallieforanimals.org/cta.html';
  function ping(stage){
    try{
      const b=new Blob([JSON.stringify({kind:'email',slug:SLUG,cta_id:CTA_ID,stage})],{type:'application/json'});
      if(navigator.sendBeacon) navigator.sendBeacon('/api/click',b);
      else new Image().src='/api/click?kind=email&slug='+encodeURIComponent(SLUG)+'&stage='+stage+'&t='+Date.now();
    }catch(_){}
  }
  // count land
  ping('open');
  // launch email (after tiny delay to flush beacon)
  setTimeout(()=>{ try{location.replace(MAILTO);}catch{location.href=MAILTO;} },75);

  let redirected=false;
  function goBack(){ if(redirected) return; redirected=true; ping('return'); location.assign(RETURN_TO); }

  // on return from mail client → CTA
  window.addEventListener('focus',()=>setTimeout(goBack,120));
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden) setTimeout(goBack,120); });
  window.addEventListener('pageshow',e=>{ if(e.persisted) setTimeout(goBack,120); });

  document.getElementById('done-return')?.addEventListener('click',e=>{ e.preventDefault(); goBack(); });
})();
