<script>
(function(){
  const SLUG='neglect-at-417-aldis-st-los-angeles', CTA_ID='neglect-at-417-aldis-st-los-angeles', MAILTO="mailto:janice.hahn@bos.lacounty.gov,nhochman@da.lacounty.gov,crminott@lasd.org,accpio@animalcare.lacounty.gov,HollyJMitchell@bos.lacounty.gov?subject=Neglect%20At%20417%20Aldis%20St%2C%20Los%20Angeles&body=To%20whom%20it%20may%20concern%2C%0A%0AThis%20is%20a%20formal%20report%20of%20severe%2C%20ongoing%20animal%20cruelty%20and%20neglect%20at%201417%20Aldis%20St%2C%20Los%20Angeles%2C%20CA%2090001.%0A%0ATwo%20adult%20dogs%20(one%20loose%20and%20distressed%20in%20the%20front%20area%3B%20one%20confined%20in%20the%20backyard).%0AOne%20black%20kitten%20(frequently%20roaming%20unattended).%0A%0AObserved%20Conditions%3A%0A%0AExtended%20owner%20absences%20(days%20at%20a%20time)%20with%20no%20access%20to%20food%20or%20water%20provided.%0ASevere%20emaciation%20in%20both%20dogs%20(ribs%2C%20spine%2C%20and%20hip%20bones%20prominently%20visible)%2C%20indicating%20starvation%20and%20dehydration.%0APhysical%20abuse%20including%20beating%20the%20dogs%2C%20tying%20them%20together%20as%20punishment%2C%20and%20throwing%20one%20dog%20forcefully%20against%20concrete%2C%20causing%20limping%20and%20disorientation.%0AOne%20dog%20repeatedly%20climbing%20onto%20the%20roof%2C%20posing%20imminent%20risk%20of%20fall%20and%20injury%2Fdeath.%0AExplicit%20prohibition%20to%20neighbors%20against%20providing%20food%20or%20water%2C%20with%20stated%20intent%20to%20%22train%22%20the%20animals%20as%20%22savages%22%20that%20must%20hunt%20to%20survive.%0AMultiple%20prior%20animals%20on%20the%20property%20that%20have%20disappeared%20over%20the%20past%20year.%0A%0ARequested%20Actions%3A%0AImmediate%20welfare%20check%2C%20assessment%2C%20and%20removal%2Frescue%20of%20the%20animals%20by%20DACC%20and%20LASD%20to%20prevent%20further%20suffering%20or%20death.%0ACoordinated%20criminal%20investigation%20by%20LASD%20and%20DACC%20into%20the%20neglect%2C%20abuse%2C%20and%20potential%20prior%20incidents.%0APublic%20statement%20from%20relevant%20agencies%20confirming%20steps%20taken%20or%20planned%2C%20and%20updating%20the%20community%20on%20the%20status%20of%20intervention.%0A%0APublic%20Safety%20Link%3A%20Animal%20Cruelty%20as%20Predictor%20of%20Human%20Violence%3A%0AAnimal%20cruelty%20is%20a%20well-documented%20predictor%20and%20co-occurring%20factor%20with%20violence%20against%20humans.%20The%20FBI%20tracks%20animal%20cruelty%20offenses%20in%20its%20National%20Incident-Based%20Reporting%20System%20(NIBRS)%20precisely%20because%20of%20this%20link%2C%20recognizing%20it%20as%20associated%20with%20assault%2C%20domestic%20violence%2C%20rape%2C%20murder%2C%20arson%2C%20and%20child%20abuse.%20Landmark%20research%2C%20including%20a%20Massachusetts%20SPCA%2FNortheastern%20University%20study%2C%20shows%20animal%20abusers%20are%20five%20times%20more%20likely%20to%20commit%20violent%20crimes%20against%20people.%20Additional%20studies%20indicate%20animal%20abuse%20occurs%20in%20up%20to%2088%25%20of%20homes%20investigated%20for%20child%20physical%20abuse%2C%20underscoring%20the%20broader%20community%20risk%20and%20the%20need%20for%20swift%20enforcement.%0A%0ARelevant%20California%20Penal%20Code%20Violations%20(Based%20on%20Described%20Conduct)%3A%0APenal%20Code%20%C2%A7%20597(a)%3A%20Maliciously%20and%20intentionally%20maims%2C%20mutilates%2C%20tortures%2C%20wounds%2C%20or%20kills%20a%20living%20animal.%0APenal%20Code%20%C2%A7%20597(b)%3A%20Overworks%2C%20tortures%2C%20torments%2C%20deprives%20of%20necessary%20sustenance%2Fdrink%2Fshelter%2C%20cruelly%20beats%2C%20mutilates%2C%20or%20cruelly%20kills%20an%20animal%3B%20or%2C%20as%20owner%2Fcustodian%2C%20subjects%20an%20animal%20to%20needless%20suffering%2C%20inflicts%20unnecessary%20cruelty%2C%20abuses%20an%20animal%2C%20or%20fails%20to%20provide%20proper%20food%2C%20drink%2C%20shelter%2C%20or%20protection%20from%20the%20weather.%0A%0AA%20prior%20report%20has%20been%20submitted%20to%20DACC.%20This%20escalates%20the%20matter%20for%20coordinated%20response%20due%20to%20the%20severity%2C%20ongoing%20nature%2C%20and%20public%20safety%20implications.%0APlease%20provide%20a%20public%20statement%20on%20actions%20taken%20or%20in%20progress.%0A%0AEvidence%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1os9qx_e7R6RKTUegTtIfVo1Y4ARCky63%2Fview%3Fusp%3Dsharing%0A%0ASincerely%2C%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org", RETURN_TO='https://hallieforanimals.org/cta.html';
  function ping(stage){
    try{
      const b=new Blob([JSON.stringify({kind:'email',slug:SLUG,cta_id:CTA_ID,stage})],{type:'application/json'});
      if(navigator.sendBeacon) navigator.sendBeacon('/api/click',b);
      else new Image().src='/api/click?kind=email&slug='+encodeURIComponent(SLUG)+'&stage='+stage+'&t='+Date.now();
    }catch(_){}
  }
  // count land
  ping('open');
  // launch email (after tiny delay to flush beacon)
  setTimeout(()=>{ try{location.replace(MAILTO);}catch{location.href=MAILTO;} },75);

  let redirected=false;
  function goBack(){ if(redirected) return; redirected=true; ping('return'); location.assign(RETURN_TO); }

  // on return from mail client → CTA
  window.addEventListener('focus',()=>setTimeout(goBack,120));
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden) setTimeout(goBack,120); });
  window.addEventListener('pageshow',e=>{ if(e.persisted) setTimeout(goBack,120); });

  document.getElementById('done-return')?.addEventListener('click',e=>{ e.preventDefault(); goBack(); });
})();
