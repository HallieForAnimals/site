<body>
  <div class="card" role="dialog" aria-live="polite">
    <h1>Opening your email app…</h1>
    <p>If nothing happens, tap the button below.</p>
    <div class="row">
      <a id="open" class="button" href="mailto:Ysabel.Jurado@lacity.org,firstdistrict@bos.lacounty.gov,35361@lapd.online,35924@lapd.online,annette.ramirez@lacity.org,karen.bass@lacity.org?subject=Dog%20Being%20Beaten%20at%20San%20Julian%20St%20and%206th%20St%20Skid%20Row%20Central%20Area&body=To%20whom%20it%20may%20concern%2C%0A%0AI%20am%20reporting%20a%20case%20of%20animal%20cruelty%20observed%20in%20Skid%20Row.%0A%0AIncident%20Details%3A%20%20%0A-%20Location%3A%20San%20Julian%20Street%20and%206th%20Street%20intersection%2C%20Skid%20Row%2C%20Los%20Angeles%20(Central%20City%20East%2C%20LAPD%20Central%20Area%2C%20City%20Council%20District%2014%2C%20LA%20County%20District%201).%20%20%0A-%20Description%3A%20A%20homeless%20individual%20is%20repeatedly%20beating%20his%20dog%20over%20the%20head.%20%20%0A%0AThis%20appears%20to%20violate%20California%20Penal%20Code%20sections%20on%20animal%20cruelty%20(e.g.%2C%20willful%20infliction%20of%20unnecessary%20suffering).%20Response%20is%20needed%20to%20protect%20the%20animal%2C%20investigate%2C%20and%20remove%20the%20dog%20for%20safety.%0A%0AI%20respectfully%20request%3A%20%20%0A1.%20LAPD%20Central%20Division%20assess%20the%20situation%20and%20intervene%20as%20appropriate.%20%20%0A2.%20LA%20Animal%20Services%20investigate%20and%20enforce%20animal%20welfare%20laws.%20%20%0A3.%20Coordination%20between%20LAPD%20and%20Animal%20Services%20for%20action%20in%20Skid%20Row.%20%20%0A%0AThank%20you%20for%20your%20prompt%20attention.%20Swift%20action%20can%20prevent%20further%20suffering%20to%20this%20animal.%0A%0AEvidence%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1aCyCVfo4bQXXQMv16tBfeBSD2aJO7W9Z%2Fview%3Fusp%3Dsharing%0A%0ASincerely%2C%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org" rel="nofollow">Open email</a>
      <a id="done-return" class="button" href="https://hallieforanimals.org/cta.html" rel="nofollow">Done? Back to CTA</a>
    </div>
  </div>

<script>
(function(){
  const SLUG='arrest-skid-row-dog-abuser', CTA_ID='arrest-skid-row-dog-abuser', MAILTO="mailto:Ysabel.Jurado@lacity.org,firstdistrict@bos.lacounty.gov,35361@lapd.online,35924@lapd.online,annette.ramirez@lacity.org,karen.bass@lacity.org?subject=Dog%20Being%20Beaten%20at%20San%20Julian%20St%20and%206th%20St%20Skid%20Row%20Central%20Area&body=To%20whom%20it%20may%20concern%2C%0A%0AI%20am%20reporting%20a%20case%20of%20animal%20cruelty%20observed%20in%20Skid%20Row.%0A%0AIncident%20Details%3A%20%20%0A-%20Location%3A%20San%20Julian%20Street%20and%206th%20Street%20intersection%2C%20Skid%20Row%2C%20Los%20Angeles%20(Central%20City%20East%2C%20LAPD%20Central%20Area%2C%20City%20Council%20District%2014%2C%20LA%20County%20District%201).%20%20%0A-%20Description%3A%20A%20homeless%20individual%20is%20repeatedly%20beating%20his%20dog%20over%20the%20head.%20%20%0A%0AThis%20appears%20to%20violate%20California%20Penal%20Code%20sections%20on%20animal%20cruelty%20(e.g.%2C%20willful%20infliction%20of%20unnecessary%20suffering).%20Response%20is%20needed%20to%20protect%20the%20animal%2C%20investigate%2C%20and%20remove%20the%20dog%20for%20safety.%0A%0AI%20respectfully%20request%3A%20%20%0A1.%20LAPD%20Central%20Division%20assess%20the%20situation%20and%20intervene%20as%20appropriate.%20%20%0A2.%20LA%20Animal%20Services%20investigate%20and%20enforce%20animal%20welfare%20laws.%20%20%0A3.%20Coordination%20between%20LAPD%20and%20Animal%20Services%20for%20action%20in%20Skid%20Row.%20%20%0A%0AThank%20you%20for%20your%20prompt%20attention.%20Swift%20action%20can%20prevent%20further%20suffering%20to%20this%20animal.%0A%0AEvidence%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1aCyCVfo4bQXXQMv16tBfeBSD2aJO7W9Z%2Fview%3Fusp%3Dsharing%0A%0ASincerely%2C%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org", RETURN_TO='https://hallieforanimals.org/cta.html';
  function ping(stage){
    try{
      const b=new Blob([JSON.stringify({kind:'email',slug:SLUG,cta_id:CTA_ID,stage})],{type:'application/json'});
      if(navigator.sendBeacon) navigator.sendBeacon('/api/click',b);
      else new Image().src='/api/click?kind=email&slug='+encodeURIComponent(SLUG)+'&stage='+stage+'&t='+Date.now();
    }catch(_){}
  }
  // count land
  ping('open');
  // launch email (after tiny delay to flush beacon)
  setTimeout(()=>{ try{location.replace(MAILTO);}catch{location.href=MAILTO;} },75);

  let redirected=false;
  function goBack(){ if(redirected) return; redirected=true; ping('return'); location.assign(RETURN_TO); }

  // on return from mail client → CTA
  window.addEventListener('focus',()=>setTimeout(goBack,120));
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden) setTimeout(goBack,120); });
  window.addEventListener('pageshow',e=>{ if(e.persisted) setTimeout(goBack,120); });

  document.getElementById('done-return')?.addEventListener('click',e=>{ e.preventDefault(); goBack(); });
})();
</script>
</body>
</html>
