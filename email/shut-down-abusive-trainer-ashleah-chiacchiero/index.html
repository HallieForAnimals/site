<script>
(function(){
  const SLUG='shut-down-abusive-trainer-ashleah-chiacchiero', CTA_ID='shut-down-abusive-trainer-ashleah-chiacchiero', MAILTO="mailto:StateAttorney@sa15.org,animalcruelty@pbso.org,acox@sa15.org,bradshawr@pbso.org?subject=Report%20of%20Animal%20Cruelty%20by%20Dog%20Trainer%20Ashleah%20Suzanne%20(Smart%20Dogs%20Walk)&body=To%20whom%20it%20may%20concern%2C%0A%0AI%20am%20reporting%20suspected%20animal%20cruelty%20by%20Ashleah%20Suzanne%20Chiacchiero%20%2C%20owner%2Foperator%20of%20Smart%20Dogs%20Walk%20(813%20Snowden%20Dr%2C%20Lake%20Worth%20Beach%2C%20FL%2033461%3B%20Website%3A%20www.smartdogswalk.com%20Instagram%3A%20%40smartdogswalk).%20She%20promotes%20and%20uses%20prong%20collars%20and%20e-collars%20(shock%20collars)%20as%20training%20tools%2C%20including%20on%20a%206lb%20puppy.%20These%20devices%20inflict%20unnecessary%20pain%20and%20suffering%20by%20design%2C%20violating%20Florida%20Statute%20828.12(1)%20(misdemeanor%20cruelty%20for%20unnecessary%20torment)%20and%20potentially%20828.12(2)%20(third-degree%20felony%20aggravated%20cruelty%20for%20intentional%20acts%20causing%20excessive%20or%20repeated%20unnecessary%20pain).%20Palm%20Beach%20County%20Code%20Sec.%204-24%20also%20prohibits%20physical%20abuse%20of%20animals.%0A%0AVeterinary%20consensus%20(American%20Veterinary%20Society%20of%20Animal%20Behavior%20position%20statement)%20rejects%20prong%20and%20e-collars%20due%20to%20risks%20of%20neck%20trauma%20(tracheal%20collapse%2C%20thyroid%20damage%2C%20cervical%20spine%20injury)%2C%20fear-based%20aggression%2C%20and%20elevated%20stress%20(cortisol%20spikes).%20Studies%20link%20these%20aversive%20tools%20to%20increased%20aggression%3A%0A%0A*%20Herron%20et%20al.%20(2009%2C%20Applied%20Animal%20Behaviour%20Science)%3A%20Prong%20collars%20elicit%20aggressive%20responses%20(growling%2C%20snapping%2C%20biting)%20in%2025-43%25%20of%20dogs.%0A*%20Schalke%20et%20al.%20(2007)%20and%20Cooper%20et%20al.%20(2014%2C%20PLoS%20ONE)%3A%20E-collars%20cause%20severe%20stress%2C%20fe   function ping(stage){
    try{
      const b=new Blob([JSON.stringify({kind:'email',slug:SLUG,cta_id:CTA_ID,stage})],{type:'application/json'});
      if(navigator.sendBeacon) navigator.sendBeacon('/api/click',b);
      else new Image().src='/api/click?kind=email&slug='+encodeURIComponent(SLUG)+'&stage='+stage+'&t='+Date.now();
    }catch(_){}
  }
  // count land
  ping('open');
  // launch email (after tiny delay to flush beacon)
  setTimeout(()=>{ try{location.replace(MAILTO);}catch{location.href=MAILTO;} },75);

  let redirected=false;
  function goBack(){ if(redirected) return; redirected=true; ping('return'); location.assign(RETURN_TO); }

  // on return from mail client → CTA
  window.addEventListener('focus',()=>setTimeout(goBack,120));
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden) setTimeout(goBack,120); });
  window.addEventListener('pageshow',e=>{ if(e.persisted) setTimeout(goBack,120); });

  document.getElementById('done-return')?.addEventListener('click',e=>{ e.preventDefault(); goBack(); });
})();
