rs%20dogs%2C%20and%20erodes%20public%20trust.%20%20%0A%0AWe%20demand%3A%20%20%0A-%20Immediate%20permanent%20ban%20on%20Lee%20Cox%20from%20all%20Kennel%20Club%2FCrufts%20events%2C%20handling%2C%20judging%2C%20exhibiting%2C%20breeding%20privileges%2C%20or%20affiliated%20activities.%20%20%0A-%20Review%2Fupdate%20of%20eligibility%20criteria%20for%20convicted%20animal%20abusers.%20%20%0A-%20Public%20statement%20addressing%20the%20conviction%20and%20actions%20taken.%20%20%0A%0ARSPCA%3A%20Investigate%20current%20welfare%20at%20Cox's%20facilities.%20%20%0A%0ASincerely%2C%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org">

<script>
(function(){
  const SLUG='ban-lee-cox-from-showing-dogs', CTA_ID='ban-lee-cox-from-showing-dogs', MAILTO="mailto:supportercare@rspca.org.uk,Mark.Beazley@royalkennelclub.org.uk,breedshows@thekennelclub.org.uk,KCNotifications@thekennelclub.org.uk,press.office@thekennelclub.org.uk?subject=Ban%20Lee%20Cox%20From%20Showing%20Dogs&body=To%20whom%20it%20may%20concern%2C%0A%0AThis%20year's%20Crufts%20Best%20in%20Show%20winning%20handler%20Lee%20Cox%20was%20convicted%20in%202001%20under%20the%20Protection%20of%20Animals%20Act%201911%20for%20causing%20unnecessary%20suffering%20to%20a%20cocker%20spaniel%20named%20Adam%20in%20%22disgusting%22%20kennel%20conditions%20at%20Kaston%20Kennels%20(co-run%20by%20Cox).%20The%20dog%20suffered%20a%20chronic%20ear%20infection%20that%20ulcerated%2C%20oozed%20pus%2C%20and%20required%20surgical%20removal%20of%20the%20inner%20ear.%20%20%0A%0AAt%20no%20point%20would%20someone%20convicted%20of%20child%20abuse%20be%20allowed%20to%20enter%20a%20child%20into%20a%20beauty%20pageant%2C%20so%20why%20is%20a%20convicted%20animal%20abuser%20permitted%20to%20handle%2C%20show%2C%20or%20judge%20dogs%20at%20the%20world's%20largest%20dog%20event%3F%20Your%20%22isolated%20incident%22%20claim%20ignores%20documented%20risks%3A%20%20%0A%0A-%2096%25%20of%20animal%20abusers%20have%20prior%20or%20subsequent%20criminal%20records%20(41%25%20interpersonal%20violence%2C%2018%25%20sex%20offenses).%20%20%0A-%20Near%20100%25%20recidivism%20in%20cases%20like%20animal%20hoarding.%20%20%0A-%2085%25%20of%20animal%20cruelty%20arrests%20involve%20multiple%20prior%20arrests%20(70%25%20felonies).%20%20%0A-%2070%25%20of%20domestic%20violence%20perpetrators%20are%20also%20animal%20abusers.%20%20%0A%0AAnimal%20abuse%20correlates%20strongly%20with%20violent%20and%20sexual%20offenses%2C%20abusers%20are%20up%20to%205%20times%20more%20likely%20to%20commit%20crimes%20against%20humans%2C%20escalating%20from%20animals%20to%20assault%2C%20rape%2C%20domestic%20violence%2C%20or%20worse.%20Allowing%20Cox%20access%20undermines%20animal%20welfare%2C%20endangers%20dogs%2C%20and%20erodes%20public%20trust.%20%20%0A%0AWe%20demand%3A%20%20%0A-%20Immediate%20permanent%20ban%20on%20Lee%20Cox%20from%20all%20Kennel%20Club%2FCrufts%20events%2C%20handling%2C%20judging%2C%20exhibiting%2C%20breeding%20privileges%2C%20or%20affiliated%20activities.%20%20%0A-%20Review%2Fupdate%20of%20eligibility%20criteria%20for%20convicted%20animal%20abusers.%20%20%0A-%20Public%20statement%20addressing%20the%20conviction%20and%20actions%20taken.%20%20%0A%0ARSPCA%3A%20Investigate%20current%20welfare%20at%20Cox's%20facilities.%20%20%0A%0ASincerely%2C%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org", RETURN_TO='https://hallieforanimals.org/cta.html';
  function ping(stage){
    try{
      const b=new Blob([JSON.stringify({kind:'email',slug:SLUG,cta_id:CTA_ID,stage})],{type:'application/json'});
      if(navigator.sendBeacon) navigator.sendBeacon('/api/click',b);
      else new Image().src='/api/click?kind=email&slug='+encodeURIComponent(SLUG)+'&stage='+stage+'&t='+Date.now();
    }catch(_){}
  }
  // count land
  ping('open');
  // launch email (after tiny delay to flush beacon)
  setTimeout(()=>{ try{location.replace(MAILTO);}catch{location.href=MAILTO;} },75);

  let redirected=false;
  function goBack(){ if(redirected) return; redirected=true; ping('return'); location.assign(RETURN_TO); }

  // on return from mail client → CTA
  window.addEventListener('focus',()=>setTimeout(goBack,120));
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden) setTimeout(goBack,120); });
  window.addEventListener('pageshow',e=>{ if(e.persisted) setTimeout(goBack,120); });

  document.getElementById('done-return')?.addEventListener('click',e=>{ e.preventDefault(); goBack(); });
})();
</script>
