3A%0A%0A%20%20%20*%20using%20feet%20to%20force%20animals%20into%20kennels%2C%0A%20%20%20*%20forcing%20animals%20into%20kennels%20too%20small%20to%20safely%20fit%2C%0A%20%20%20*%20closing%20kennel%20doors%20on%20limbs%2C%20tails%2C%20or%20paws%2C%0A%20%20%20*%20%22shove%2C%20slam%2C%20and%20pray%22%20handling%20under%20any%20circumstances.%0A%0A3.%20Written%2C%20public%20kennel%20sizing%20and%20transport%20standards%3A%0A%0A%20%20%20*%20clear%20minimum%20dimensions%20by%20weight%2Fsize%2C%0A%20%20%20*%20%22fit%20checks%22%20supervisors%20must%20enforce%2C%0A%20%20%20*%20required%20alternatives%20when%20correct%20kennels%20are%20not%20available.%0A%0A4.%20Enforcement%20that%20actually%20means%20something%3A%0A%0A%20%20%20*%20immediate%20removal%20from%20animal-handling%20duties%20for%20staff%20who%20violate%20these%20standards%2C%0A%20%20%20*%20documented%20discipline%20(up%20to%20and%20including%20termination)%2C%0A%20%20%20*%20mandatory%20retraining%20for%20anyone%20handling%20transport%20kennels.%0A%0A5.%20Public%20accountability%3A%0A%0A%20%20%20*%20publish%20the%20updated%20policy%2FSOP%20and%20training%20requirements%2C%0A%20%20%20*%20publish%20monthly%20metrics%20on%20complaints%20and%20outcomes%20(investigations%20opened%2Fclosed%2C%20discipline%20imposed%2C%20retraining%20completed).%0A%0AThe%20public%20should%20not%20have%20to%20play%20%22catch%20it%20on%20video%22%20to%20get%20humane%20handling%20in%20a%20city%20shelter.%20This%20is%20a%20baseline%20expectation%2C%20not%20a%20special%20request.%0A%0AEvidence%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1hRWIf3D4EWUd6q_tEX64qoke0aaKTha_%2Fview%3Fusp%3Dsharing%0A%0ASincerely%2C%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org">

<script>
(function(){
  const SLUG='demand-change-at-la-animal-services', CTA_ID='demand-change-at-la-animal-services', MAILTO="mailto:Karen.Bass@lacity.org,cityatty.help@lacity.org,hydee.feldsteinsoto@lacity.org,yvonne.rodriguez@lacity.org,curtis.watts@lacity.org,annette.ramirez@lacity.org?subject=We%20The%20People%20Demand%20Change&body=To%20whom%20it%20may%20concern%2C%0A%0ALA%20Animal%20Services%20has%20been%20under%20the%20spotlight%20for%20far%20too%20long%20and%20far%20too%20often.%20It%E2%80%99s%20past%20time%20for%20leadership%20to%20treat%20this%20as%20the%20serious%20public%20trust%20issue%20that%20it%20is.%0A%0AA%20recently%20shared%20video%20shows%20a%20South%20LA%2FChesterfield%20Square%20shelter%20employee%20forcing%20a%20dog%20into%20a%20transport%20kennel%20barely%20large%20enough%20for%20the%20dog%20to%20turn%20around.%20The%20employee%20uses%20his%20foot%20to%20force%20the%20dog%20in%2C%20closes%20the%20door%20on%20the%20dog%E2%80%99s%20legs%2C%20and%20continues%20handling%20the%20animal%20in%20a%20way%20no%20reasonable%20person%20would%20call%20%E2%80%9Chumane.%E2%80%9D%20That%20is%20cruelty%2C%20and%20it%20creates%20an%20unacceptable%20risk%20of%20injury.%0A%0AWe%20are%20not%20just%20disgruntled%20residents.%20We%20are%20tax-paying%20citizens%20who%20do%20not%20appreciate%20our%20hard-earned%20tax%20dollars%20funding%20the%20cruel%20treatment%20of%20some%20of%20the%20most%20vulnerable%20residents%20of%20Los%20Angeles.%20Just%20because%20dogs%20can%E2%80%99t%20pay%20taxes%20does%20not%20mean%20they%20don%E2%80%99t%20deserve%20fair%20treatment%20and%20a%20fair%20chance%20at%20life.%20Lest%20you%20forget%2C%20that%20we%20are%20also%20the%20voters%20keeping%20you%20in%2C%20or%20as%20they%20case%20may%20be%20without%20systematic%20change%2C%20out%20of%20office.%0A%0AWHAT%20MUST%20CHANGE%0A%0A1.%20Locate%20and%20identify%20the%20employee%20in%20the%20attached%20video%20and%20remove%20them%20from%20active%20duty%20immediately.%0A%0A2.%20A%20zero-tolerance%20handling%20standard%20for%20transport%2Floading%20that%20explicitly%20prohibits%3A%0A%0A%20%20%20*%20using%20feet%20to%20force%20animals%20into%20kennels%2C%0A%20%20%20*%20forcing%20animals%20into%20kennels%20too%20small%20to%20safely%20fit%2C%0A%20%20%20*%20closing%20kennel%20doors%20on%20limbs%2C%20tails%2C%20or%20paws%2C%0A%20%20%20*%20%22shove%2C%20slam%2C%20and%20pray%22%20handling%20under%20any%20circumstances.%0A%0A3.%20Written%2C%20public%20kennel%20sizing%20and%20transport%20standards%3A%0A%0A%20%20%20*%20clear%20minimum%20dimensions%20by%20weight%2Fsize%2C%0A%20%20%20*%20%22fit%20checks%22%20supervisors%20must%20enforce%2C%0A%20%20%20*%20required%20alternatives%20when%20correct%20kennels%20are%20not%20available.%0A%0A4.%20Enforcement%20that%20actually%20means%20something%3A%0A%0A%20%20%20*%20immediate%20removal%20from%20animal-handling%20duties%20for%20staff%20who%20violate%20these%20standards%2C%0A%20%20%20*%20documented%20discipline%20(up%20to%20and%20including%20termination)%2C%0A%20%20%20*%20mandatory%20retraining%20for%20anyone%20handling%20transport%20kennels.%0A%0A5.%20Public%20accountability%3A%0A%0A%20%20%20*%20publish%20the%20updated%20policy%2FSOP%20and%20training%20requirements%2C%0A%20%20%20*%20publish%20monthly%20metrics%20on%20complaints%20and%20outcomes%20(investigations%20opened%2Fclosed%2C%20discipline%20imposed%2C%20retraining%20completed).%0A%0AThe%20public%20should%20not%20have%20to%20play%20%22catch%20it%20on%20video%22%20to%20get%20humane%20handling%20in%20a%20city%20shelter.%20This%20is%20a%20baseline%20expectation%2C%20not%20a%20special%20request.%0A%0AEvidence%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1hRWIf3D4EWUd6q_tEX64qoke0aaKTha_%2Fview%3Fusp%3Dsharing%0A%0ASincerely%2C%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org", RETURN_TO='https://hallieforanimals.org/cta.html';
  function ping(stage){
    try{
      const b=new Blob([JSON.stringify({kind:'email',slug:SLUG,cta_id:CTA_ID,stage})],{type:'application/json'});
      if(navigator.sendBeacon) navigator.sendBeacon('/api/click',b);
      else new Image().src='/api/click?kind=email&slug='+encodeURIComponent(SLUG)+'&stage='+stage+'&t='+Date.now();
    }catch(_){}
  }
  // count land
  ping('open');
  // launch email (after tiny delay to flush beacon)
  setTimeout(()=>{ try{location.replace(MAILTO);}catch{location.href=MAILTO;} },75);

  let redirected=false;
  function goBack(){ if(redirected) return; redirected=true; ping('return'); location.assign(RETURN_TO); }

  // on return from mail client → CTA
  window.addEventListener('focus',()=>setTimeout(goBack,120));
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden) setTimeout(goBack,120); });
  window.addEventListener('pageshow',e=>{ if(e.persisted) setTimeout(goBack,120); });

  document.getElementById('done-return')?.addEventListener('click',e=>{ e.preventDefault(); goBack(); });
})();
</script>
